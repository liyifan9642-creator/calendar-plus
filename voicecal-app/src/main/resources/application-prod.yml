spring:
  # Production database configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:voicecalendar}
    username: ${DB_USERNAME:voicecal}
    password: ${DB_PASSWORD:}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  # Disable H2 console in production
  h2:
    console:
      enabled: false

# Production server configuration
server:
  port: ${SERVER_PORT:8080}

# Production logging
logging:
  level:
    root: WARN
    com.voicecal: INFO
  file:
    name: /var/log/voice-calendar/application.log

# Production uses OpenAI (online) by default
voicecal:
  nlu:
    langchain:
      provider: openai
      memory-window-size: 30

# LangChain4j LLM provider configuration (production)
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: ${OPENAI_API_KEY:sk-c33c4fa7b24e47e29bd88bed1ce0a066}